services:
  nextapp:
    build: ./
    expose:
      - "3000"
    restart: always
    networks:
      - frontend-network

  proxy-server:
    image: nginx:alpine       # Используем официальный образ
    ports:
      - "80:80"             # Маппинг: localhost:8080 -> контейнер:3000
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextapp
    restart: always
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge
