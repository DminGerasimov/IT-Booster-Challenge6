server {
    listen 80;
    server_name localhost; # Укажите свой домен, если есть

    # Сжатие gzip (сильно ускоряет загрузку Next.js статики)
    # gzip on;
    # gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        # Проксирование на контейнер с Next.js
        proxy_pass http://nextapp:3000;

        # Настройки протокола и заголовков
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;    # Поддержка WebSockets
        proxy_set_header Connection 'upgrade';    # Поддержка WebSockets
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;   # Реальный IP пользователя
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
